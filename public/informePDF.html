  <link

    rel="stylesheet">

  <style>
    :root {
      --azul: #1F78FF;
      --gris: #333333;
      --gris-claro: #F2F2F2;
      --espacio: 16px;
      --page-width-mm: 210mm;
      /* A4 */
    }

    /* Reset básico */
    * {
      box-sizing: border-box
    }

    body {
      /* font-family: 'Roboto', system-ui, sans-serif; */
      font-family: "Abel", sans-serif;
      font-weight: 500;
      font-size: 18px;
      color: var(--gris);
      margin: 0;
      background: #efefef;
    }

    h4 {
      font-weight: 700;
      font-size: 21px;
    }

    /* Contenedor que simula el documento */
    .doc-wrap {
      max-width: 900px;
      margin: 24px auto;
      padding: 24px
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px
    }

    button {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer
    }

    /* Estilos de página (cada .page será una hoja A4 cuando se exporte a PDF) */
    .page {
      width: 210mm;
      height: 297mm;
      /* Fijar exactamente una A4 */
      background: white;
      margin: 0;
      position: relative;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      /* evita cortes extra */
    }

    /* MARCO INTERNO */
    .marco {
      border: 2px solid #007BFF;
      border-radius: 5mm;
      padding: 8mm;
      margin: 20mm 12mm 20mm 12mm;
      /* margen interno superior / inferior */
      height: calc(297mm - 40mm);
      /* altura real útil */
      box-sizing: border-box;
    }

    /* Contenido */
    .content {
      overflow: hidden;
      /* evita “spill” */
    }

    .marco,
    .content,
    table,
    h2,
    p {
      page-break-inside: avoid;
    }

    /* Header / Footer */
    .header {
      position: absolute;
      top: 5mm;
      left: 10mm;
      right: 10mm;
      text-align: center;
    }

    .footer {
      position: absolute;
      bottom: 5mm;
      left: 10mm;
      right: 10mm;
      text-align: center;
    }

    /* === PORTADA PREMIUM === */
    .cover-page {
      padding: 0 !important;
      position: relative;
      overflow: hidden;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
      color: white;
      font-family: 'Montserrat', sans-serif;
    }

    /* Overlay degradado premium */
    .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
          rgba(0, 0, 0, 0.65) 0%,
          rgba(0, 0, 0, 0.30) 40%,
          rgba(0, 0, 0, 0.55) 100%);
      z-index: 1;
    }

    /* Contenedor central */
    .cover-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40mm 25mm 30mm 25mm;
      text-align: center;
    }

    /* Logo */
    .cover-logocomun {
      width: 25mm;
      opacity: 0.95;
      margin-bottom: 20mm;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .cover-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30mm;
      /* si querés ajustarlo */

    }

    /* Títulos */
    .cover-title {

      font-weight: 700;

    .cover-subtitle {

    }

    /* RESUMEN EJECUTIVO */
    .cover-resumen {

    /* Pie */

      bottom: 12mm;

      text-align: center;
      font-size: 12pt;
      opacity: 0.85;

    }

    .cover2-page {
      padding: 0 !important;

      /* font-family: 'Montserrat', sans-serif; */
    }

    /* Overlay degradado premium */
    .cover2-overlay {

    }

    /* Contenedor central */
    .cover2-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40mm 25mm 30mm 25mm;

    }

    /* Logo */
    .cover2-logocomun {
      width: 25mm;

    }

    .cover2-logo {
      position: absolute;

      /* si querés ajustarlo */
      opacity: 0.95;
    }

    /* Títulos */
    .cover2-empresa {
      font-size: 35pt;

      color: #333333;
      position: absolute;
      top: 80mm;

    }

    /* Títulos */
    .cover2-infoeje {

    .cover2-indiGes {

    /* RESUMEN EJECUTIVO */
    .cover2-resumen {
      margin-top: 18mm;

      font-weight: 300;
      line-height: 1.55;
      text-align: justify;
      padding: 0 5mm;
      position: absolute;

      /* text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5); */
    }

    /* Pie */
    .cover2-bottom {
      position: absolute;
      bottom: 12mm;
      left: 40px;
      width: 100%;
      text-align: center;
      font-size: 12pt;

    }

    .logo-image {
      width: 20mm;

      opacity: 0.9;
    }

    h2.section-title {
      /* font-family: 'Montserrat'; */
      font-size: 24px;
      margin: 0px 0 5px 0;
      color: var(--azul);
      font-weight: 700;
    }

    /* Contenedor de las métricas: 4 columnas fijas */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
    }

    /* Tarjetas */
    .metric {
      background: #fff;
      border: 5px solid #eee;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      /* apila label arriba y valor abajo */
      align-items: center;
      /* centra horizontalmente */
    }

    .metric .label {
      font-size: 12px;
      color: #666;
    }

    .metric .value {
      font-size: 22px;
      font-weight: 600;
      margin-top: 6px;
    }

    .tabla-indicadores {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 12px;
    }

    .tabla-indicadores th,
    .tabla-indicadores td {
      border: 1px solid #999;
      padding: 6px;
    }

    .tabla-indicadores th {
      background: #f0f0f0;
    }

    .fila-total td {
      background: #fafafa;
      font-size: 13px;
    }


    /* 📱 RESPONSIVE: en pantallas pequeñas pasa a 2x2 */
    @media (max-width: 768px) {
      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* 📱 Extra chico: 1 por línea */
    @media (max-width: 450px) {
      .metrics {
        grid-template-columns: 1fr;
      }
    }

    /* Responsive preview scaling */
    @media (max-width:980px) {
      .doc-wrap {
        padding: 10px
      }

      .page {
        width: 100%;
        min-height: 1200px
      }
    }

    /* Tabla simple */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px
    }

    th,
    td {
      padding: 8px;
      border: 1px solid #eee;
      text-align: left;
      font-size: 16px
    }

    th {
      background: var(--gris-claro);
      font-weight: 600
    }

    /* Page break helper */
    .page-break {
      page-break-after: always;
    }

    /* TOC */
    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0
    }

    .toc-list li {
      padding: 6px 0;
      border-bottom: 1px dashed #eee
    }

    .toc-level-1 {
      margin-left: 0;
      /* font-weight: bold; */
    }

    .toc-level-2 {
      margin-left: 20px;
    }

    .toc-level-3 {
      margin-left: 40px;
      font-size: 0.95em;
    }


    .separator {
      width: 65%;
      height: 3px;
      background: #444;
      border-radius: 3px;
      margin: 0 auto 35px auto;
      position: absolute;
      top: 100mm;
    }

    .perspectiva-section {
      margin-bottom: 40px;
      page-break-after: always;
    }

    .perspectiva-section:last-child {
      page-break-after: auto;
    }

    @media print {
      .perspectiva-section {
        page-break-after: always;
      }
    }

    .tree-report-container {
      font-size: 14px;
    }

    .tree-report-row {
      padding: 2px 0;
      border-left: 2px solid #ddd;
      padding-left: 8px;
    }

    .estado-verde {

    }

    .estado-amarillo {

    }

    .estado-rojo {

      font-weight: 600;
    }

    .tabla-informe {
      width: 100%;
      border-collapse: collapse;

    }

    .tabla-informe th,
    .tabla-informe td {

    }

    .tabla-informe th {

    }

    .fila-usuario {

    }

    .org-linea {

    }

    .sin-indicadores {

    }

    .usuario-block {
      margin-bottom: 20px;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    /* 📄 Reglas de impresión */
    @media print {
      table {
        page-break-inside: auto;
      }

      h3 {
        page-break-after: avoid;
      }

      tr {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      thead {
        display: table-header-group;
        /* 🔥 Repite encabezado */
      }

      .fila-usuario {
        background-color: #e0e0e0 !important;
      }

      .org-linea {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      ul,
      li {
        page-break-inside: avoid;
      }

      .usuario-block {
        page-break-before: always;
        break-before: page;
      }

      .salto-hoja {
        page-break-before: always;
        break-before: page;
      }
    }

    .toolbar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 16px;
    }

    .btn-pdf {
      background-color: #2563eb;
      /* azul */
      color: #fff;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.1s ease;
    }

    .btn-pdf:hover {
      background-color: rgb(233, 50, 50);
    }

    .btn-pdf:active {
      transform: translateY(1px);
      box-shadow: 0 3px 3px rgba(0, 0, 0, 0.2);
    }

    .pdf-icon {
      color: #c62828;
      background: white;
      border-radius: 3px;
      padding: 2px 4px;
      margin-left: 8px;
      font-size: 0.9em;
    }


    /* Overlay */
    .pdf-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      z-index: 3000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Caja central */
    .pdf-modal-content {
      background: #ffffff;
      padding: 32px 40px;
      border-radius: 16px;
      min-width: 320px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .25);
      animation: scaleIn .3s ease-out;
    }

    /* Texto */
    .pdf-text {
      font-size: 1rem;
      font-weight: 500;
      color: #1f2937;
    }

    /* Check animado */
    .pdf-check {
      font-size: 64px;
      color: #16a34a;
      animation: pop .4s ease-out;
    }

    /* Animaciones */
    @keyframes scaleIn {
      from {
        transform: scale(.9);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes pop {
      0% {
        transform: scale(0);
      }

      70% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="doc-wrap">
    <div class="toolbar">
      <button id="btn-pdf" class="btn-pdf">
        Exportar informe a PDF
        <i class="fas fa-file-pdf pdf-icon"></i>
      </button>
    </div>

    <!-- Contenedor donde el script creará las páginas -->
    <div id="documento"></div>
  </div>


  <!-- 🧾 Modal Generación PDF -->
  <div id="pdfModal" class="pdf-modal d-none">
    <div class="pdf-modal-content text-center">

      <!-- Spinner -->
      <div id="pdfSpinner" class="spinner-border text-primary mb-3" role="status"></div>

      <!-- Check animado -->
      <div id="pdfSuccessIcon" class="pdf-check d-none">✓</div>

      <!-- Texto -->
      <div id="pdfModalText" class="pdf-text">
        Creando informe PDF…<br>
        <small>Por favor espere</small>
      </div>

      <!-- Botón cerrar -->
      <button id="btnCerrarPdfModal" class="btn btn-outline-primary btn-sm mt-3 d-none">
        Cerrar
      </button>

    </div>
  </div>


  <!-- Dependencia para exportar a PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

  <script>
    // Datos de ejemplo (luego los reemplazás por tus datos reales)
    empresa = "ORGANIZACION";
    const ejemplo = {
      titulo: 'Informe de Indicadores',
      subtitulo: 'Gestión, seguimiento y análisis de métricas organizacionales',
      fecha: new Date().toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' }),
      autor: 'Área de Gestión de Indicadores',
      logoUrl: '../dist/images/logo-myriq.png'
    };

    // --- Construcción del documento (DOM) ---
    const documento = document.getElementById('documento');

    // 🧲🧲🧲 clearDocument
    function clearDocument() { documento.innerHTML = ''; }

    // 🧲🧲🧲 createPage
    function createPage() {
      const page = document.createElement('section');
      page.className = 'page';

      // Header (fuera del marco)
      const header = document.createElement('div');
      header.className = 'header';
      header.innerHTML = `<div>${ejemplo.titulo}</div><div>${ejemplo.fecha}</div>`;
      page.appendChild(header);

      // Marco interno
      const marco = document.createElement('div');
      marco.className = 'marco';
      page.appendChild(marco);

      // Contenido dentro del marco
      const content = document.createElement('div');
      content.className = 'content';
      marco.appendChild(content);

      // Footer (fuera del marco)
      const footer = document.createElement('div');
      footer.className = 'footer';
      footer.innerHTML = `
    <div>Generado por: ${ejemplo.autor}</div>
    <div class="page-number">Página</div>
  `;
      page.appendChild(footer);

      return { page, content };
    }


    // ===============================================================================
    // 🧲🧲🧲 buildCaratula
    // ===============================================================================
    function buildCaratula() {
      const page = document.createElement('section');
      page.className = 'page cover2-page';

      // === Fondo completo ===
      // page.style.backgroundImage = 'url("../dist/images/Fondomy.png")';
      page.style.backgroundImage = 'url("../dist/images/PortadaAzulBlanca.png")';

      // Contenedor central
      const content = document.createElement('div');
      content.className = 'cover2-content';

      // Empresa
      const subtitle = document.createElement('div');
      subtitle.className = 'cover2-empresa';
      subtitle.textContent = "ORGANIZACION";
      content.appendChild(subtitle);

      //Informe Ejecutivo
      const infoEje = document.createElement('div');
      infoEje.className = 'cover2-infoeje';
      infoEje.textContent = "Informe Ejecutivo";
      content.appendChild(infoEje);

      //Indicadores de Gestión
      const indiGes = document.createElement('div');
      indiGes.className = 'cover2-indiGes';
      indiGes.textContent = "Indicadores de Gestión";
      content.appendChild(indiGes);


      // Título
      const title = document.createElement('div');
      title.className = 'cover2-seguimiento';
      title.textContent = "Seguimiento y análisis de métricas organizacionales.";
      content.appendChild(title);


      // Pie inferior
      const bottom = document.createElement('div');
      bottom.className = 'cover2-bottom';
      bottom.textContent = `${ejemplo.fecha}`;
      content.appendChild(bottom);

      page.appendChild(content);

      documento.appendChild(page);
    }

    // ===============================================================================
    // 🧲🧲🧲 buildIndice
    // ===============================================================================
    function buildIndice() {
      const { page, content } = createPage();
      const h = document.createElement('h2');
      h.className = 'section-title';
      h.textContent = 'Tabla de Contenido';
      h.style.textAlign = 'center';
      content.appendChild(h);

      const ul = document.createElement('ul'); ul.className = 'toc-list';
      // Generamos entradas acordes a las secciones previstas
      const entradas = [
        { id: 'marco-intro', text: 'Marco Introductorio y Visión General', level: 1 },
        { id: 'resumen-ejecutivo', text: 'Resumen Ejecutivo', level: 1 },
        { id: 'indicadores-globales', text: 'Indicadores Globales', level: 1 },
        { id: 'cumplimiento-por-destino', text: 'Cumplimiento por Destino', level: 1 },
        { id: 'composicion-resultados', text: 'Composición de los resultados', level: 1 },
        { id: 'indicadores-contribucion', text: 'Contribución por Indicador', level: 1 },
        { id: 'bsc-balance-scorecard', text: 'BSC - Balance Scorecard', level: 1 },

        { id: 'bsc-grafico-cumplimiento', text: 'Gráfico de cumplimiento promedio', level: 2 },

        { id: 'bsc-perspectiva-3', text: 'Indicadores de Perspectiva Capital Humano', level: 3 },
        { id: 'bsc-perspectiva-4', text: 'Indicadores de Perspectiva Procesos', level: 3 },


        { id: 'ponderacion-destinos-indicadores', text: 'Ponderación de Destinos e Indicadores', level: 1, isAnexo: true },
        { id: 'usuarios-registrados', text: 'Usuarios Registrados', level: 1, isAnexo: true },
        { id: 'estructura-organizacional', text: 'Estructura Organizacional', level: 1, isAnexo: true },
        { id: 'dependencias-roles-usuarios', text: 'Dependencia entre Usuarios y Roles', level: 1, isAnexo: true },
        { id: 'relacion-usuarios-indicadores', text: 'Usuarios e indicadores asignados', level: 1, isAnexo: true }
      ];

      const tocMap = {};
      let c1 = 0, c2 = 0, c3 = 0;
      let anexoCount = 0;
      let enAnexos = false;

      entradas.forEach(item => {
        const li = document.createElement('li');
        let numeracion = '';

        if (item.isAnexo) {
          if (!enAnexos) {
            enAnexos = true;
            anexoCount = 0;
          }

          anexoCount++;
          numeracion = `Anexo ${toRoman(anexoCount)} - `;
          li.className = 'toc-anexo';

        } else {
          if (item.level === 1) {
            c1++;
            c2 = 0;
            c3 = 0;
            numeracion = `${c1}.`;
            li.className = 'toc-level-1';
          }

          if (item.level === 2) {
            c2++;
            c3 = 0;
            numeracion = `${c1}.${c2}.`;
            li.className = 'toc-level-2';
          }

          if (item.level === 3) {
            c3++;
            numeracion = `${c1}.${c2}.${c3}.`;
            li.className = 'toc-level-3';
          }
        }

        li.textContent = `${numeracion} ${item.text}`;
        ul.appendChild(li);

        if (item.id) {
          tocMap[item.id] = numeracion.trim();
        }
      });

      content.appendChild(ul);
      documento.appendChild(page);
      return tocMap;

      // 🥼🥼🥼
      function toRoman(num) {
        const map = [
          { v: 1000, s: 'M' },
          { v: 900, s: 'CM' },
          { v: 500, s: 'D' },
          { v: 400, s: 'CD' },
          { v: 100, s: 'C' },
          { v: 90, s: 'XC' },
          { v: 50, s: 'L' },
          { v: 40, s: 'XL' },
          { v: 10, s: 'X' },
          { v: 9, s: 'IX' },
          { v: 5, s: 'V' },
          { v: 4, s: 'IV' },
          { v: 1, s: 'I' }
        ];

        let result = '';
        map.forEach(m => {
          while (num >= m.v) {
            result += m.s;
            num -= m.v;
          }
        });
        return result;
      }
    }

    // =========================================
    //😎😎😎 getSemaforo

    function getSemaforo(valor) {
      if (valor >= 90) return '🟢';
      if (valor >= 70) return '🟡';
      return '🔴';
    }

    // ===============================================================================
    // 🧲🧲🧲 buildUltimoMes - 5. Composición de la última medición
    // ===============================================================================
    function buildUltimoMes() {

      const dataPDF = JSON.parse(
        localStorage.getItem('detalleUltimoMesPDF')
      );

      const { page, content } = createPage();
      const h = document.createElement('h2');
      h.className = 'section-title';
      h.textContent = 'Composición de la última medición';
      h.dataset.toc = 'composicion-resultados';
      h.dataset.level = '1';
      content.appendChild(h);

      const p = document.createElement('p');
      p.innerHTML = `
              Valor de los indicadores que conforman la última mediciónnn<br>
            `;
      content.appendChild(p);

      const sub = document.createElement('h4');
      sub.textContent = `Período: ${dataPDF.month}`;
      content.appendChild(sub);


      // Agrupar por destino
      const grupos = dataPDF.indicadores.reduce((acc, d) => {
        if (!acc[d.destinoNombre]) acc[d.destinoNombre] = [];
        acc[d.destinoNombre].push(d);
        return acc;
      }, {});

      // Ordenar indicadores por cumplimiento DESC
      Object.keys(grupos).forEach(destino => {
        grupos[destino].sort((a, b) => b.cumplimiento - a.cumplimiento);
      });

      // Variables de paginación
      let currentPage = null;
      let currentContent = null;
      let alturaAcumulada = 0;
      const MAX_ALTURA = 950; // Altura máxima antes de crear nueva página (ajustar según necesites)
      let esPrimeraPagina = true;

      // Iniciar primera página
      iniciarNuevaPagina();

      // Renderizar por destino
      Object.keys(grupos).forEach(destino => {
        const indicadores = grupos[destino];

        // Calcular altura estimada del destino completo
        const alturaDestino = 40; // Título del destino
        const alturaEncabezadoTabla = 35;
        const alturaFilaPorIndicador = 30;
        const alturaTotal = alturaDestino + alturaEncabezadoTabla +
          (indicadores.length * alturaFilaPorIndicador) + 20;

        // Si el destino completo cabe en la página actual
        if (alturaAcumulada + alturaTotal < MAX_ALTURA) {
          // Renderizar destino completo
          renderizarDestino(destino, indicadores);
          alturaAcumulada += alturaTotal;
        } else {
          // Necesitamos dividir o crear nueva página
          // Si apenas empezamos la página, renderizar lo que se pueda
          if (alturaAcumulada < 200) {
            renderizarDestino(destino, indicadores);
            alturaAcumulada += alturaTotal;
          } else {
            // Crear nueva página y renderizar ahí
            iniciarNuevaPagina();
            renderizarDestino(destino, indicadores);
            alturaAcumulada += alturaTotal;
          }
        }

      });

      // TOTAL GENERAL al final
      // Verificar si cabe en la página actual
      if (alturaAcumulada + 50 > MAX_ALTURA) {
        iniciarNuevaPagina();
      }

      const total = document.createElement('p');
      total.style.marginTop = '12px';
      total.innerHTML = `
        <strong>Total contribución del período:
        ${dataPDF.totalContribucion.toFixed(2)}%</strong>
      `;
      currentContent.appendChild(total);

      //😎😎😎 iniciarNuevaPagina
      function iniciarNuevaPagina() {
        const { page, content } = createPage();
        currentPage = page;
        currentContent = content;
        alturaAcumulada = 0;

        // Solo en la primera página agregar título y descripción
        if (esPrimeraPagina) {

          // const { page, content } = createPage();
          const h = document.createElement('h2');
          h.className = 'section-title';
          h.textContent = 'Composición de la última medición';
          h.dataset.toc = 'composicion-resultados';
          h.dataset.level = '1';
          content.appendChild(h);

          const p = document.createElement('p');
          p.innerHTML = `
              Valor de los indicadores que conforman la última medición<br>
            `;
          content.appendChild(p);

          const sub = document.createElement('h4');
          sub.textContent = `Período: ${dataPDF.month}`;
          content.appendChild(sub);

          alturaAcumulada = 180; // Altura estimada del encabezado
          esPrimeraPagina = false;
        } else {
          // En páginas siguientes, agregar continuación
          const cont = document.createElement('h3');
          cont.textContent = 'Composición de la última medición(continuación)';
          cont.style.fontSize = '16px';
          cont.style.marginBottom = '10px';
          currentContent.appendChild(cont);
          alturaAcumulada = 60;
        }

        documento.appendChild(currentPage);
      }

      //😎😎😎 renderizarDestino
      function renderizarDestino(destino, indicadores) {
        // --- Título del destino ---
        const hDestino = document.createElement('h4');
        hDestino.style.marginTop = '16px';
        hDestino.textContent = destino;
        currentContent.appendChild(hDestino);

        // --- Tabla del destino ---
        const table = document.createElement('table');
        table.className = 'tabla-indicadores';

        table.innerHTML = `
            <thead>
              <tr>
                <th></th>
                <th>Indicador</th>
                <th>Cumplimiento</th>
                <th>Peso</th>
                <th>Contribución</th>
              </tr>
            </thead>
            <tbody></tbody>
          `;
        const tbody = table.querySelector('tbody');

        indicadores.forEach(d => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="text-align:center">${getSemaforo(d.cumplimiento)}</td>
            <td>${d.indicador}</td>

            <td><strong>${d.contribucion.toFixed(2)}%</strong></td>

          tbody.appendChild(tr);

      }

      //😎😎😎 buildTablaPerspectivas
      function buildTablaPerspectivas(resumenPorDimension) {
        const table = document.createElement("table");
        table.style.width = "100%";
        table.style.borderCollapse = "collapse";
        table.style.marginTop = "12px";
        table.style.fontSize = "16px";

        table.innerHTML = `
        <thead>
            <tr style="background:#f0f0f0">
                <th style="border:1px solid #999; padding:6px">Perspectiva</th>
                <th style="border:1px solid #999; padding:6px; text-align:center">Indicadores</th>
                <th style="border:1px solid #999; padding:6px; text-align:center">Promedio</th>
                <th style="border:1px solid #999; padding:6px; text-align:center">Ponderado</th>
                <th style="border:1px solid #999; padding:6px; text-align:center">Estado</th>
            </tr>
        </thead>
        <tbody></tbody>
    `;

        const tbody = table.querySelector("tbody");

        let totalPromedio = 0;
        let totalPonderado = 0;
        let totalIndicadores = 0;

        resumenPorDimension.forEach(d => {
          totalPromedio += Number(d.promedio) || 0;
          totalPonderado += Number(d.promedioPon) || 0;
          totalIndicadores += d.indicadores.length;

          const estado = d.promedioPon >= 80 ? 'Alto' :
            d.promedioPon >= 50 ? 'Medio' : 'Bajo';

          const color = d.promedioPon >= 80 ? '#d4edda' :
            d.promedioPon >= 50 ? '#fff3cd' : '#f8d7da';

          tbody.insertAdjacentHTML("beforeend", `
            <tr style="background:${color}; font-size:18px">
                <td style="border:1px solid #999; padding:6px">${d.dimension}</td>
                <td style="border:1px solid #999; padding:6px; text-align:center">${d.indicadores.length}</td>
                <td style="border:1px solid #999; padding:6px; text-align:center">${Number(d.promedio).toFixed(1)}%</td>
                <td style="border:1px solid #999; padding:6px; text-align:center">${Number(d.promedioPon).toFixed(1)}%</td>
                <td style="border:1px solid #999; padding:6px; text-align:center">${estado}</td>
            </tr>
            `);
        });

        const promedioOrg = resumenPorDimension.length
          ? (totalPromedio / resumenPorDimension.length).toFixed(1)
          : 0;

        const ponderadoOrg = (totalPonderado / resumenPorDimension.length).toFixed(1);
        const estadoOrg = ponderadoOrg >= 80 ? 'Alto' :
          ponderadoOrg >= 50 ? 'Medio' : 'Bajo';

        const colorOrg = ponderadoOrg >= 80 ? '#c3e6cb' :
          ponderadoOrg >= 50 ? '#ffeeba' : '#f5c6cb';

        // 🔹 FILA TOTAL ORGANIZACIONAL
        tbody.insertAdjacentHTML("beforeend", `
        <tr style="font-weight:bold; background:${colorOrg}">
            <td style="border:2px solid #555; padding:6px">TOTAL ORGANIZACIONAL</td>
            <td style="border:2px solid #555; padding:6px; text-align:center">${totalIndicadores}</td>
            <td style="border:2px solid #555; padding:6px; text-align:center">${promedioOrg}%</td>
            <td style="border:2px solid #555; padding:6px; text-align:center">${ponderadoOrg}%</td>
            <td style="border:2px solid #555; padding:6px; text-align:center">${estadoOrg}</td>
        </tr>
    `);
        return table;
        localStorage.removeItem("resumenPorDimension");
      }
    }

        // 😎😎😎
        function eliminarUltimaColumna(html) {
          const temp = document.createElement("div");
          temp.innerHTML = `<table><tbody>${html}</tbody></table>`;
          const filas = temp.querySelectorAll("tr");
          filas.forEach(tr => {

          return temp.querySelector("tbody").innerHTML;

    function buildPondeDestinosIndicadores() {

          dependencias o procesos) y de los indicadores definidos.   Cada destino tiene asignado un peso relativo dentro del destino al que pertenece. Cada indicador incluye su peso relativo dentro del destino al que pertenece y su contribución porcentual al cumplimiento global (combinando su peso dentro del destino y el peso de los destinos que lo contienen.)<br><br>

      // 😎😎😎 renderNode
      function renderNode(node, level = 0) {

      <div>

          ${node.weight?.toFixed(2) || 0}%
        </span>
        ${node.type === 'sector' || node.id === 'root'
            ? `<strong>${node.name}</strong>`
            : node.name
          }
      </div>
      <div>
        ${node.type === 'indicador'
            ? `${node.globalWeight?.toFixed(2) || 0}%`
            : ''
          }
      </div>
    `;

        container.appendChild(row);

        const rowHeight = row.offsetHeight;
        currentHeight += rowHeight;

        // 🚨 SALTO DE PÁGINA CORRECTO
        if (currentHeight > MAX_HEIGHT) {

          // nueva página SIN repetir título
          newPage(false);

          container.appendChild(row);
          currentHeight = rowHeight;
        }

        if (node.children && node.children.length > 0) {
          node.children.forEach(child =>
            renderNode(child, level + 1)
          );
        }
      }

    }

    async function buildUsuarios() {

        return aN.localeCompare(bN, "es");

          const p = document.createElement("p");

        table.className = "tabla-informe";

      <thead>
        <tr>
          <th>Legajo</th>
          <th>Nombre</th>
          <th>Cargo</th>
          <th>Sector</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Estado</th>
        </tr>

      <tbody></tbody>

    async function buildOrganigramaTextual() {
      const { page, content } = createPage();

      const h = document.createElement('h2');
      h.className = 'section-title';
      h.textContent = 'Dependencia entre Usuarios y Roles';
      h.dataset.toc = 'dependencias-roles-usuarios';
      h.dataset.level = '1';      //  marca para el índice
      content.appendChild(h);

      const p = document.createElement('p');
      p.textContent = 'Representación de la relación entre los usuarios y sus roles.';
      content.appendChild(p);

      const resp = await fetch('/usuarios').then(r => r.json());
      const usuarios = Array.isArray(resp) ? resp : resp.data || resp.rows || [];
      // console.log(usuarios)

      const arbol = construirArbolOrganigrama(usuarios);

      const raiz = document.createElement('div');
      raiz.className = 'org-linea org-raiz';
      raiz.textContent = 'Dirección General';
      content.appendChild(raiz);

      renderOrganigramaTextual(content, arbol);

      documento.appendChild(page);

      // 😎😎😎 Construye árbol jerárquico
      function construirArbolOrganigrama(usuarios) {
        const map = {};
        const roots = [];

        // Normalizar legajos
        usuarios.forEach(u => {
          const legajo = String(u.legajo);
          map[legajo] = { ...u, legajo, hijos: [] };
        });

        usuarios.forEach(u => {
          const legajo = String(u.legajo);
          const jefe = u.legajo_jefe ? String(u.legajo_jefe) : null;

          if (jefe && map[jefe]) {
            map[jefe].hijos.push(map[legajo]);
          } else {
            roots.push(map[legajo]);
          }
        });

        return roots;
      }

      // 😎😎😎 Render textual recursivo
      function renderOrganigramaTextual(container, nodos, prefijo = '') {
        nodos.forEach((nodo, index) => {
          const esUltimo = index === nodos.length - 1;

          const linea = document.createElement('div');
          linea.className = 'org-linea';

          const conector = esUltimo ? '└── ' : '├── ';
          linea.textContent =
            prefijo +
            conector +
            `${nodo.apellido}, ${nodo.nombres}${nodo.cargo ? ' (' + nodo.cargo + ')' : ''}`;

          container.appendChild(linea);

          const nuevoPrefijo = prefijo + (esUltimo ? '    ' : '│   ');

          if (nodo.hijos && nodo.hijos.length > 0) {
            renderOrganigramaTextual(container, nodo.hijos, nuevoPrefijo);
          }
        });
      }

    }

      nuevaPagina('Anexo V - Usuarios e indicadores asignados');

      const [usuarios, indicadores, sectores] = await Promise.all([

        fetch('/sectores').then(r => r.json())
      ]);

      const mapSectores = {};

        mapSectores[s.id] = s;
      });

      // 📌 Agrupar indicadores por responsable (legajo)
      const indicadoresPorUsuario = {};
      indicadores.forEach(i => {
        if (!indicadoresPorUsuario[i.responsable]) {
          indicadoresPorUsuario[i.responsable] = [];
        }
        indicadoresPorUsuario[i.responsable].push(i);
      });

      const usuariosConIndicadores = [];
      const usuariosSinIndicadores = [];

      usuarios.forEach(u => {
        if (indicadoresPorUsuario[u.legajo]?.length) {
          usuariosConIndicadores.push(u);
        } else {
          usuariosSinIndicadores.push(u);
        }
      });

      renderUsuarios(
        usuariosConIndicadores,
        usuariosSinIndicadores,
        indicadoresPorUsuario,
        mapSectores
      );
      // }

      // 🥼🥼🥼 renderTablaUsuarios
      function renderUsuarios(
        usuariosConIndicadores,
        usuariosSinIndicadores,
        indicadoresPorUsuario,
        mapSectores
      ) {
        /* USUARIOS CON INDICADORES */
        usuariosConIndicadores.forEach(u => {

          const indicadores = indicadoresPorUsuario[u.legajo] || [];

          // 🧮 Líneas necesarias
          const lineasUsuario =
            2 +                    // título usuario
            1 +                    // destino
            indicadores.length +   // indicadores
            1;                     // espacio

          agregarLineas(lineasUsuario);

          // 🧍‍♂️ Usuario
          const h3 = document.createElement('div');
          h3.style.fontWeight = 'bold';
          h3.style.fontSize = '18px';
          h3.textContent = `Legajo ${u.legajo} – ${u.apellido}, ${u.nombres}`;
          contentActual.appendChild(h3);

          // 🏷️ Destino
          const destino = document.createElement('p');
          const rutaSector = u.sector
            ? obtenerRutaSector(u.sector, mapSectores)
            : 'No informado';
          destino.textContent = `Sector: ${rutaSector}`;
          contentActual.appendChild(destino);

          // 📋 Indicadores
          const ul = document.createElement('ul');
          indicadores.forEach(i => {
            const li = document.createElement('li');
            li.textContent = i.nombre;
            ul.appendChild(li);
          });
          contentActual.appendChild(ul);
        });

        /* USUARIOS sin INDICADORES */
        if (usuariosSinIndicadores.length > 0) {

          const lineasSin = 2 + usuariosSinIndicadores.length;
          agregarLineas(lineasSin);

          const h3 = document.createElement('h4');
          h3.textContent = 'Usuarios sin indicadores asignados';
          contentActual.appendChild(h3);

          const ul = document.createElement('ul');
          usuariosSinIndicadores.forEach(u => {
            const li = document.createElement('li');
            li.textContent = `${u.apellido}, ${u.nombres} (Legajo ${u.legajo})`;
            ul.appendChild(li);
          });
          contentActual.appendChild(ul);
        }
      }

      // 🥼🥼🥼
      function obtenerRutaSector(idSector, mapSectores) {
        const ruta = [];
        let actual = mapSectores[idSector];
        while (actual) {
          ruta.unshift(actual.nombre); // agrega al inicio
          actual = actual.sector_padre_id ? mapSectores[actual.sector_padre_id] : null;
        }
        return ruta.join(' > ');
      }

      // 🥼🥼🥼
      function nuevaPagina(titulo = null) {
        const { page, content } = createPage();
        if (titulo) {
          const h = document.createElement('h2');
          h.className = 'section-title';
          h.textContent = titulo;
          content.appendChild(h);
        }
        documento.appendChild(page);
        pageActual = page;
        contentActual = content;
        lineasActuales = 0;
      }

      // 🥼🥼🥼
      function agregarLineas(lineasNecesarias) {
        if (lineasActuales + lineasNecesarias > MAX_LINEAS) {
          // nuevaPagina('Anexo V - Usuarios e indicadores asignados (cont.)');
          nuevaPagina()
        }
        lineasActuales += lineasNecesarias;
      }
    }

      });
      return count;
    }


    // ===============================================================================
    // 🧲🧲🧲 buildAnexos - NO SE UTILIZA
    // ===============================================================================
    function buildAnexos() {
      const { page, content } = createPage();
      const h = document.createElement('h2'); h.className = 'section-title'; h.textContent = 'Anexos';
      content.appendChild(h);

      const p = document.createElement('p'); p.textContent = 'Listado completo de mediciones y notas metodológicas.';
      content.appendChild(p);

      documento.appendChild(page);
    }

    // ===============================================================================
    // 🧲🧲🧲 numerarPaginas
    // ===============================================================================
    function numerarPaginas() {
      const pages = [...document.querySelectorAll('.page')];
      pages.forEach((p, idx) => {
        const el = p.querySelector('.page-number');
        if (el) el.textContent = `Página ${idx + 1} de ${pages.length}`;
      });
    }


    // ===============================================================================
    // 🧲🧲🧲 numerarTitulosDesdeIndice
    // ===============================================================================
    function numerarTitulosDesdeIndice(tocMap) {
      document.querySelectorAll('[data-toc]').forEach(h => {
        const id = h.dataset.toc;
        const numero = tocMap[id];

        if (!numero) return;

        // evita duplicar si se vuelve a ejecutar
        if (h.dataset.numbered) return;

        h.textContent = `${numero} ${h.textContent}`;
        h.dataset.numbered = 'true';
      });
    }


    // ===============================================================================
    // 🧲🧲🧲 buildDocumento completo 🧲🧲🧲
    // ===============================================================================
    async function buildDocument() {
      clearDocument();
      // buildCover();
      await buildCaratula();
      const tocMap = await buildIndice(); // índice con numeración
      await buildMarcoIntroductorio(); // marco introductorio
      await buildResumen(); // resumen ejecutivo
      await buildIndicadoresGlobales(); // indicadores globales
      await buildCumplimientoPorDestino(); // cumplimiento por destino
      await buildUltimoMes(); //  Composición de los resultados
      await buildIndicadoresPorContribucion(); // Contribución por indicador
      await buildBSC(); // Balanced Scorecard
      await buildBSCPerspectiva(); // perspectivas BSC
      await buildPondeDestinosIndicadores(); // Anexo I. Ponderacón de Destinos e Indicadores
      await buildUsuarios(); // Anexo II.  Usuarios registrados
      await buildAnexoSectoresII(); // Anexo III. Estructura organizacional con usuarios
      await buildOrganigramaTextual();   // Anexo IV. Dependencia entre Usuarios y Roles
      await buildUsuariosIndicadores(); // Anexo V. Usuarios e indicadores asignados
      numerarPaginas();
      numerarTitulosDesdeIndice(tocMap);

      // await buildAnexoSectores();
      // await buildAnexoSectoresConUsuarios();
      // buildAnexos();
    }


    // ===============================================================================
    // 🏀🏀🏀 Exportar a PDF usando html2pdf
    // ===============================================================================
    async function exportPDF() {
      const filename = `Informe_myResultIQ_${new Date().toISOString().slice(0, 10)}.pdf`;
      showPdfModal("Creando informe PDF…<br><small>Por favor espere</small>");
      const node = documento.cloneNode(true);

      const opt = {
        margin: 0,
        filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 1.9, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css'] }
      };

      const holder = document.createElement('div');
      holder.style.position = 'fixed';
      holder.style.left = '-9999px';
      holder.appendChild(node);
      document.body.appendChild(holder);

      try {
        await html2pdf().set(opt).from(node).save();
        showPdfSuccess(filename);
      } catch (e) {
        console.error(e);
        alert("Error al generar PDF");
        closePdfModal();
      } finally {
        document.body.removeChild(holder);
      }
    }

    // 🏀🏀🏀 
    function showPdfModal(text) {
      const modal = document.getElementById('pdfModal');
      document.getElementById('pdfSpinner').classList.remove('d-none');
      document.getElementById('pdfSuccessIcon').classList.add('d-none');
      document.getElementById('btnCerrarPdfModal').classList.add('d-none');
      document.getElementById('pdfModalText').innerHTML = text;
      modal.classList.remove('d-none');
    }

    // 🏀🏀🏀 
    function showPdfSuccess(filename) {
      document.getElementById('pdfSpinner').classList.add('d-none');
      document.getElementById('pdfSuccessIcon').classList.remove('d-none');
      document.getElementById('pdfModalText').innerHTML =
        `Informe generado correctamente<br>
     <small class="text-muted">${filename}</small>`;
      document.getElementById('btnCerrarPdfModal').classList.remove('d-none');
    }

    // 🏀🏀🏀 
    function closePdfModal() {
      const modal = document.getElementById('pdfModal');
      modal.classList.add('d-none');
    }

    // ===============================================================================
    // 🏀🏀🏀 document.addEventListener('DOMContentLoaded', 
    // ===============================================================================

    document.addEventListener('DOMContentLoaded', () => {

      buildDocument(); // construye TODO el contenido

      const btn = document.getElementById('btn-pdf');
      if (btn) {
        btn.addEventListener('click', exportPDF);
      }

      const btnCerrar = document.getElementById('btnCerrarPdfModal');
      if (btnCerrar) {
        btnCerrar.addEventListener('click', closePdfModal);
      }

    });

  </script>
